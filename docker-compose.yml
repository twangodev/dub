services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  sam-audio:
    build:
      context: ./sam-audio
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - huggingface-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      SAM_AUDIO_URL: http://sam-audio:8000
      DATA_DIR: /app/data/jobs
    volumes:
      - job-data:/app/data
    depends_on:
      - redis
      - sam-audio

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      SAM_AUDIO_URL: http://sam-audio:8000
      DATA_DIR: /app/data/jobs
    volumes:
      - job-data:/app/data
    depends_on:
      - redis
      - sam-audio

volumes:
  job-data:
  huggingface-cache:
